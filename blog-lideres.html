<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorio para Líderes — Mónica Leguizamón Calcagno</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #2d2d2d; --bone: #f4f4f2; --warm: #ede8e3; --gold: #d77256; --gold-light: #32b0c6; --navy: #042d43; --muted: #6b7c85; --line: rgba(45,45,45,0.12); }
  html { scroll-behavior: smooth; }
  body { font-family: 'Montserrat', sans-serif; background: var(--bone); color: var(--ink); font-weight: 300; overflow-x: hidden; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; background: rgba(244,244,242,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .nav-back { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); padding-bottom: 2px; }
  .nav-back:hover { color: var(--ink); }
  .blog-header { padding: 10rem 5rem 4rem; border-bottom: 1px solid var(--line); }
  .blog-eyebrow { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
  .blog-title { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 5rem); font-weight: 400; line-height: 1.05; margin-bottom: 1rem; }
  .blog-title em { font-style: italic; color: var(--gold); }
  .blog-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.8; max-width: 55ch; margin-top: 1rem; }
  .controls { padding: 2rem 5rem; border-bottom: 1px solid var(--line); display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; background: var(--warm); }
  .search-box { flex: 1; min-width: 220px; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 300; padding: 0.8rem 1.2rem; border: 1px solid var(--line); background: var(--bone); color: var(--ink); outline: none; transition: border-color 0.3s; }
  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: var(--muted); }
  .results-count { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-left: auto; }
  .posts-grid { padding: 4rem 5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2px; }
  .post-card { background: var(--bone); border: 1px solid var(--line); padding: 2.5rem; text-decoration: none; color: var(--ink); display: flex; flex-direction: column; transition: border-color 0.3s, background 0.3s; }
  .post-card:hover { border-color: var(--gold); background: var(--warm); }
  .post-date { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.8rem; }
  .post-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 400; line-height: 1.3; margin-bottom: 1rem; }
  .post-excerpt { font-size: 0.8rem; line-height: 1.8; color: var(--muted); flex: 1; }
  .post-link { margin-top: 1.5rem; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 2px; display: inline-block; }
  footer { padding: 2.5rem 5rem; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-family: 'Playfair Display', serif; font-size: 0.95rem; letter-spacing: 0.1em; color: var(--muted); }
  .footer-logo span { color: var(--gold); }
  @media (max-width: 900px) { nav { padding: 1.2rem 2rem; } .blog-header { padding: 8rem 2rem 3rem; } .controls { padding: 2rem; } .posts-grid { padding: 3rem 2rem; grid-template-columns: 1fr; } footer { flex-direction: column; gap: 1rem; padding: 2rem; } }
</style>
</head>
<body>
<nav>
  <a href="index.html" style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;letter-spacing:0.1em;color:var(--ink);text-decoration:none;">MLC <span style="color:var(--gold);">Studium</span></a>
  <a href="index.html" class="nav-back">← Escritos</a>
</nav>
<div class="blog-header">
  <p class="blog-eyebrow">Blog · Distinciones de liderazgo</p>
  <h1 class="blog-title">Laboratorio para <em>Líderes</em></h1>
  <p class="blog-desc">Herramientas, conceptos y reflexiones del campo ejecutivo para líderes que quieren ir más profundo.</p>
</div>
<div class="controls">
  <input type="text" class="search-box" id="search" placeholder="Buscar por título o contenido…" oninput="filterPosts()">
  <span class="results-count" id="results-count"></span>
</div>
<div class="posts-grid" id="posts-grid"></div>
<footer>
  <div class="footer-logo">MLC <span>Studium</span> — The Gift Based Leadership Bureau</div>
</footer>
<script src="lideres-data.js"></script>
<script>
function renderPosts(posts) {
  const grid = document.getElementById('posts-grid');
  const count = document.getElementById('results-count');
  if (!posts.length) { grid.innerHTML = '<div style="grid-column:1/-1;padding:5rem;text-align:center;font-family:Playfair Display,serif;font-size:1.5rem;color:var(--muted);font-style:italic;">No se encontraron publicaciones.</div>'; count.textContent='0 resultados'; return; }
  count.textContent = posts.length === LIDERES_POSTS.length ? `${posts.length} publicaciones` : `${posts.length} resultado${posts.length!==1?'s':''}`;
  grid.innerHTML = posts.map(p => `<a class="post-card" href="${p.link}" target="_blank" rel="noopener"><div class="post-date">${p.date}</div><h2 class="post-title">${p.title}</h2><p class="post-excerpt">${p.excerpt}</p><span class="post-link">Leer →</span></a>`).join('');
}
function filterPosts() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  renderPosts(q ? LIDERES_POSTS.filter(p => p.title.toLowerCase().includes(q) || p.excerpt.toLowerCase().includes(q)) : LIDERES_POSTS);
}
renderPosts(LIDERES_POSTS);
</script>
</body>
</html>
