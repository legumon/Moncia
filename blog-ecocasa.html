<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Blog — MLC Studium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1612; --bone: #f5f0e8; --warm: #e8dfd0;
    --gold: #9a7d4e; --gold-light: #c4a97a; --muted: #7a6e62;
    --line: rgba(154,125,78,0.25);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Montserrat', sans-serif; background: var(--bone); color: var(--ink); font-weight: 300; overflow-x: hidden; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 4rem;
    background: rgba(245,240,232,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; letter-spacing: 0.12em; color: var(--ink); text-decoration: none; }
  .nav-logo span { color: var(--gold); }
  .nav-back { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold-light); padding-bottom: 2px; transition: color 0.3s; }
  .nav-back:hover { color: var(--ink); }

  .blog-header {
    padding: 10rem 5rem 4rem;
    border-bottom: 1px solid var(--line);
  }
  .blog-eyebrow { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
  .blog-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 5rem); font-weight: 300; line-height: 1.05; margin-bottom: 1rem; }
  .blog-title em { font-style: italic; color: var(--gold); }
  .blog-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.8; max-width: 55ch; margin-top: 1rem; }

  .posts-grid {
    padding: 5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 2px;
  }
  .post-card {
    background: var(--bone); border: 1px solid var(--line);
    padding: 2.5rem; text-decoration: none; color: var(--ink);
    display: flex; flex-direction: column;
    transition: border-color 0.3s, background 0.3s;
  }
  .post-card:hover { border-color: var(--gold); background: var(--warm); }
  .post-date { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.8rem; }
  .post-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; line-height: 1.3; margin-bottom: 1rem; }
  .post-excerpt { font-size: 0.82rem; line-height: 1.8; color: var(--muted); flex: 1; }
  .post-link { margin-top: 1.5rem; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border-bottom: 1px solid var(--gold-light); padding-bottom: 2px; display: inline-block; }

  .ver-mas {
    padding: 3rem 5rem 5rem;
    border-top: 1px solid var(--line);
    text-align: center;
  }
  .ver-mas p { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.7; }
  .ver-mas a {
    font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--bone); background: var(--ink);
    padding: 1rem 2.5rem; text-decoration: none;
    transition: background 0.3s; display: inline-block;
  }
  .ver-mas a:hover { background: var(--gold); }

  footer {
    padding: 2.5rem 5rem; border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; letter-spacing: 0.1em; color: var(--muted); }
  .footer-logo span { color: var(--gold); }

  @media (max-width: 900px) {
    nav { padding: 1.2rem 2rem; }
    .blog-header { padding: 8rem 2rem 3rem; }
    .posts-grid { padding: 3rem 2rem; grid-template-columns: 1fr; }
    .ver-mas { padding: 2rem; }
    footer { flex-direction: column; gap: 1rem; padding: 2rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">MLC <span>Studium</span></a>
  <a href="index.html#escritos" class="nav-back">← Escritos</a>
</nav>

<div class="blog-header">
  <p class="blog-eyebrow" id="header-eyebrow"></p>
  <h1 class="blog-title" id="header-title"></h1>
  <p class="blog-desc" id="header-desc"></p>
</div>

<div class="posts-grid" id="posts-grid"></div>

<div class="ver-mas" id="ver-mas" style="display:none">
  <p>Estos son los escritos disponibles en este sitio.<br>Para leer todas las publicaciones del blog, visitá el sitio original.</p>
  <a id="ver-mas-link" href="#" target="_blank">Ver blog completo →</a>
</div>

<footer>
  <div class="footer-logo">MLC <span>Studium</span> — The Gift Based Leadership Bureau</div>
</footer>

<script src="blogs-extra-data.js"></script>
<script>
// Config per page — detected from URL
const CONFIGS = {
  'blog-filosofia.html': {
    key: 'abriendohilos',
    eyebrow: 'Blog · Filosofía aplicada',
    title: 'Abriendo <em>Hilos</em>',
    desc: 'Reflexiones sobre filosofía, liderazgo y conciencia. Escritos que abren preguntas más que respuestas.',
    wpUrl: 'https://mlcfilosofia.wordpress.com'
  },
  'blog-comunicacion.html': {
    key: 'comunicacion',
    eyebrow: 'Blog · Comunicación consciente',
    title: 'Comunicación para la <em>Armonía</em>',
    desc: 'Comunicación consciente al servicio de las relaciones y el liderazgo.',
    wpUrl: 'https://comunicacionxalaarmonia.wordpress.com'
  },
  'blog-ecocasa.html': {
    key: 'ecocasa',
    eyebrow: 'Blog · EcoCasa Ar · Mónica',
    title: 'EcoCasa <em>Ar · Mónica</em>',
    desc: 'Escritos sobre sustentabilidad, casa y conciencia ecológica.',
    wpUrl: 'https://ecocasaarmonica.wordpress.com'
  },
};

const page = window.location.pathname.split('/').pop() || 'blog-filosofia.html';
const config = CONFIGS[page] || CONFIGS['blog-filosofia.html'];

// Set header
document.getElementById('header-eyebrow').textContent = config.eyebrow;
document.getElementById('header-title').innerHTML = config.title;
document.getElementById('header-desc').textContent = config.desc;
document.title = config.title.replace(/<[^>]+>/g,'') + ' — MLC Studium';
document.getElementById('ver-mas-link').href = config.wpUrl;

const posts = BLOGS_DATA[config.key] || [];

const grid = document.getElementById('posts-grid');

if (!posts.length) {
  grid.innerHTML = `<div style="grid-column:1/-1;padding:4rem;text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--muted);font-style:italic;">
    No hay publicaciones disponibles aquí aún.
  </div>`;
  document.getElementById('ver-mas').style.display = 'block';
} else {
  grid.innerHTML = posts.map(p => `
    <a class="post-card" href="${p.link}" target="_blank" rel="noopener">
      <div class="post-date">${p.date}</div>
      <h2 class="post-title">${p.title}</h2>
      <p class="post-excerpt">${p.excerpt}</p>
      <span class="post-link">Leer →</span>
    </a>`).join('');
  document.getElementById('ver-mas').style.display = 'block';
}
</script>
</body>
</html>
